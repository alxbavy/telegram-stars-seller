name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure local env is not uploaded
        run: |
          rm -f .env

      - name: Prepare server directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            mkdir -p /root/telegram-stars-seller

            if [ ! -f /root/telegram-stars-seller/.env ]; then
              echo "Ошибка: файл /root/telegram-stars-seller/.env не найден"
              echo "Создайте .env на сервере перед деплоем"
              exit 1
            fi

            find /root/telegram-stars-seller \
              -mindepth 1 \
              -maxdepth 1 \
              ! -name ".env" \
              -exec rm -rf {} +

      - name: Copy files via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "."
          target: "/root/telegram-stars-seller"
          rm: false

      - name: Execute deploy commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            cd /root/telegram-stars-seller

            if [ ! -f .env ]; then
              echo "Ошибка: файл /root/telegram-stars-seller/.env не найден"
              exit 1
            fi

            docker compose down
            docker compose up -d --build

            sleep 5

            docker compose exec -T web python manage.py migrate

            echo "Деплой успешно завершен"
