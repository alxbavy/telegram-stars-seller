services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data
    restart: always

  bot:
    build: .
    command: python manage.py runbot
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data
    restart: always

volumes:
  sqlite_data:
